      function LanguageProvider({ children }) {
        const [language, setLanguage] = useState("id");
        const t = (key) => translations[language][key] || key;
        return (
          <LanguageContext.Provider value={{ language, setLanguage, t }}>
            {children}
          </LanguageContext.Provider>
        );

      function useTranslation() {
        return useContext(LanguageContext);
      }

      function useIdle(onIdle, idleTime = 60000) {
        const timeoutId = useRef();
        const resetTimer = () => {
          clearTimeout(timeoutId.current);
          timeoutId.current = setTimeout(onIdle, idleTime);
        };
        useEffect(() => {
          const events = [
            "mousemove",
            "keydown",
            "click",
            "touchstart",
          ];
          const handleEvent = () => resetTimer();
          events.forEach((event) =>
            window.addEventListener(event, handleEvent)
          );
          resetTimer();
          return () => {
            clearTimeout(timeoutId.current);
            events.forEach((event) =>
              window.removeEventListener(event, handleEvent)
            );
          };
        }, [onIdle, idleTime]);
      }

      function App() {
        const [loggedInRoom, setLoggedInRoom] = useState(null);
        const [db, setDb] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [currentView, setCurrentView] = useState("LOGIN"); // LOGIN, WELCOME, DASHBOARD

        useEffect(() => {
          try {
            const config = JSON.parse(window.__firebase_config);
            const app = initializeApp(config);
            const auth = getAuth(app);
            setDb(getFirestore(app));

            const signIn = async () => {
              await setPersistence(auth, inMemoryPersistence);
              if (window.__initial_auth_token) {
                await signInWithCustomToken(
                  auth,
                  window.__initial_auth_token
                );
              } else {
                await signInAnonymously(auth);
              }
            };

            onAuthStateChanged(auth, (user) => {
              if (user) {
                setLoading(false);
              }
            });

            signIn().catch((err) => {
              console.error("Gagal login anonim:", err);
              setError(
                "Gagal terhubung ke layanan. Silakan coba lagi."
              );
              setLoading(false);
            });
          } catch (e) {
            console.error("Error inisialisasi Firebase:", e);
            setError(
              "Gagal memuat aplikasi. Periksa konsol untuk detail."
            );
            setLoading(false);
          }
        }, []);

        const handleLogin = (roomData) => {
          setLoggedInRoom(roomData);
          setCurrentView("WELCOME");
        };

        const handleLogout = () => {
          setLoggedInRoom(null);
          setCurrentView("LOGIN");
        };

        if (loading)
          return (
            <div className="min-h-screen flex items-center justify-center">
              Memuat...
            </div>
          );
        if (error)
          return (
            <div className="min-h-screen flex items-center justify-center p-4 bg-red-100 text-red-700">
              {error}
            </div>
          );

        return (
          <AppContext.Provider
            value={{ db, appId: window.__app_id, loggedInRoom }}
          >
            {currentView === "LOGIN" && (
              <RoomLogin onLogin={handleLogin} />
            )}
            {currentView === "WELCOME" && (
              <WelcomeScreen
                room={loggedInRoom}
                onContinue={() => setCurrentView("DASHBOARD")}
              />
            )}
            {currentView === "DASHBOARD" && (
              <RoomDashboard
                room={loggedInRoom}
                onLogout={handleLogout}
                onIdle={() => setCurrentView("WELCOME")}
              />
            )}
          </AppContext.Provider>
        );
      }

      function RoomLogin({ onLogin }) {
        const { db, appId } = useContext(AppContext);
        const { t, language, setLanguage } = useTranslation();
        const [roomName, setRoomName] = useState("");
        const [error, setError] = useState("");
        const [loading, setLoading] = useState(false);

        const handleLogin = async () => {
          if (!roomName.trim()) return setError(t("emptyRoomName"));
          setLoading(true);
          setError("");
          const roomsRef = collection(
            db,
            `artifacts/${appId}/public/data/rooms`
          );
          const q = query(
            roomsRef,
            where("name", "==", roomName.trim().toUpperCase())
          );
          try {
            const snapshot = await getDocs(q);
            if (snapshot.empty) {
              setError(t("roomNotFound"));
            } else {
              const roomDoc = snapshot.docs[0];
              onLogin({ id: roomDoc.id, ...roomDoc.data() });
            }
          } catch (e) {
            console.error("Error logging in:", e);
            setError(t("serverError"));
          }
          setLoading(false);
        };

        return (
          <div className="min-h-screen flex items-center justify-center p-4 overflow-hidden">
             <div className="ocean">
                <div className="wave"></div>
                <div className="wave"></div>
            </div>
            <div className="relative bg-white/80 backdrop-blur-sm p-8 rounded-2xl shadow-2xl w-full max-w-md text-center login-box-animation transition-all duration-300 hover:shadow-3xl">
              <div className="absolute top-4 right-4">
                <button
                  onClick={() =>
                    setLanguage((lang) => (lang === "id" ? "en" : "id"))
                  }
                  className="p-2 rounded-full bg-white/50 text-gray-700 hover:bg-white/80 transition-colors"
                >
                  {language === "id" ? <FlagUK /> : <FlagIndonesia />}
                </button>
              </div>
              <img src={"https://raw.githubusercontent.com/michaellay19/MOKSHA/main/MOKSHA%20PRADANA%20LOGO%20PRIMARY.png"} alt="Moksha Logo" className="mx-auto h-10 w-auto mb-4" />
              <h2 className="text-4xl font-bold text-gray-800 mb-2">
                {t("welcome")}
              </h2>
              <p className="text-gray-600 mb-6">{t("enterRoomName")}</p>
              {error && <p className="text-red-500 mb-4">{error}</p>}
              <input
                type="text"
                placeholder={t("roomNamePlaceholder")}
                value={roomName}
                onChange={(e) => setRoomName(e.target.value)}
                onKeyPress={(e) => e.key === "Enter" && handleLogin()}
                className="w-full p-3 bg-white/70 border-2 border-transparent rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent text-lg transition-shadow duration-300 shadow-inner hover:shadow-md"
              />
              <button
                onClick={handleLogin}
                disabled={loading}
                className="mt-6 w-full bg-gradient-to-r from-teal-500 to-cyan-600 hover:from-teal-600 hover:to-cyan-700 text-white font-bold py-3 px-4 rounded-lg transition-all duration-300 shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed transform hover:-translate-y-1 active:translate-y-0"
              >
                {loading ? t("checking") : t("login")}
              </button>
            </div>
          </div>
        );
      }
      
      function WelcomeScreen({ room, onContinue }) {
          const [time, setTime] = useState(new Date());
          const [greeting, setGreeting] = useState("");
          const [date, setDate] = useState("");
          const { language, t } = useTranslation();

          useEffect(() => {
              const timer = setInterval(() => setTime(new Date()), 1000);
              const hour = new Date().getHours();
              if (hour >= 5 && hour < 12)
                  setGreeting(
                      language === "id" ? "Selamat Pagi" : "Good Morning"
                  );
              else if (hour >= 12 && hour < 18)
                  setGreeting(
                      language === "id"
                          ? "Selamat Siang"
                          : "Good Afternoon"
                  );
              else
                  setGreeting(
                      language === "id" ? "Selamat Malam" : "Good Evening"
                  );

              setDate(
                  new Date().toLocaleDateString(
                      language === "id" ? "id-ID" : "en-US",
                      {
                          weekday: "long",
                          year: "numeric",
                          month: "long",
                          day: "numeric",
                      }
                  )
              );

              return () => clearInterval(timer);
          }, [language]);

          const formatTime = (date) =>
              `${String(date.getHours()).padStart(2, "0")}:${String(
                  date.getMinutes()
              ).padStart(2, "0")}:${String(date.getSeconds()).padStart(
                  2,
                  "0"
              )}`;

          return (
              <div
                  onClick={onContinue}
                  className="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-blue-800 to-teal-600 text-white p-4 cursor-pointer"
              >
                  <div className="text-center">
                      <svg
                          className="w-48 h-48 sm:w-64 sm:h-64 mx-auto mb-6"
                          viewBox="0 0 100 100"
                          fill="none"
                          xmlns="http://www.w3.org/2000/svg"
                      >
                          <path
                              d="M84 40V75C84 79.9706 79.9706 84 75 84H25C20.0294 84 16 79.9706 16 75V40C16 35.0294 20.0294 31 25 31H75C79.9706 31 84 35.0294 84 40Z"
                              fill="#D1D5DB"
                          />
                          <path
                              d="M75 16H25C20.0294 16 16 20.0294 16 25V31H84V25C84 20.0294 79.9706 16 75 16Z"
                              fill="#9CA3AF"
                          />
                          <circle
                              className="eye-blink"
                              cx="35"
                              cy="50"
                              r="5"
                              fill="white"
                          />
                          <circle
                              className="eye-blink"
                              style={{ animationDelay: "0.2s" }}
                              cx="65"
                              cy="50"
                              r="5"
                              fill="white"
                          />
                          <path
                              className="mouth-talk"
                              d="M42 68C42 66.8954 45.5817 66 50 66C54.4183 66 58 66.8954 58 68V70C58 71.1046 54.4183 72 50 72C45.5817 72 42 71.1046 42 70V68Z"
                              fill="white"
                          />
                      </svg>
                      <p className="text-5xl sm:text-6xl font-bold tracking-wider">
                          {formatTime(time)}
                      </p>
                      <p className="text-lg sm:text-xl mt-2">{date}</p>
                      <h1 className="text-2xl sm:text-3xl font-light mt-4">
                          {greeting}, {room.title || ""}{" "}
                          {room.displayName || room.name}!
                      </h1>
                  </div>
                  <p className="mt-12 text-gray-300 animate-pulse">
                      {t("tapToContinue")}
                  </p>
              </div>
          );
      }

      function RoomDashboard({ room, onLogout, onIdle }) {
        const { db, appId } = useContext(AppContext);
        const { t, language, setLanguage } = useTranslation();
        const [isCalling, setIsCalling] = useState(room.isCalling || false);
        const [activeTab, setActiveTab] = useState("pesan");
        const [settingsOpen, setSettingsOpen] = useState(false);
        const [notifications, setNotifications] = useState([]);
        const [unreadCount, setUnreadCount] = useState(0);
        const [showNotifications, setShowNotifications] = useState(false);

        useIdle(onIdle, 60000);

        // Listener for staff call status
        useEffect(() => {
          const roomRef = doc(db, `artifacts/${appId}/public/data/rooms`, room.id);
          const unsubscribe = onSnapshot(roomRef, (doc) => {
            setIsCalling(doc.data()?.isCalling || false);
          });
          return () => unsubscribe();
        }, [db, room.id, appId]);

        // Listener for order notifications
        useEffect(() => {
            if (!db || !room.name) return;
            const ordersRef = collection(db, `artifacts/${appId}/public/data/orders`);
            
            const q = query(
                ordersRef,
                where("roomNumber", "==", room.name)
            );
            
            const unsubscribe = onSnapshot(q, (snapshot) => {
                const allOrders = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                const unreadNotifs = allOrders.filter(order => order.isReadByCustomer === false);
                
                setNotifications(unreadNotifs);
                setUnreadCount(unreadNotifs.length);
            }, (error) => {
                console.error("Error fetching notifications:", error);
            });
            
            return () => unsubscribe();
        }, [db, room.name, appId]);


        const toggleCallStaff = async () => {
          const roomRef = doc(db, `artifacts/${appId}/public/data/rooms`, room.id);
          await updateDoc(roomRef, { isCalling: !isCalling });
        };

        const handleBellClick = async () => {
            setShowNotifications(prev => !prev);
        };
        
        const clearFinishedNotifications = async () => {
             if (notifications.length > 0) {
                const batch = writeBatch(db);
                notifications.forEach(notif => {
                  if (notif.status === "Selesai" || notif.status === "Dibatalkan") {
                      const orderRef = doc(db, `artifacts/${appId}/public/data/orders`, notif.id);
                      batch.update(orderRef, { isReadByCustomer: true });
                  }
                });
                await batch.commit();
                setShowNotifications(false); // Close dropdown after clearing
            }
        }

        return (
          <div className="min-h-screen bg-gray-50">
            <header className="bg-white p-4 shadow-md sticky top-0 z-20">
              <div className="flex justify-between items-center max-w-7xl mx-auto">
                <div className="flex items-center space-x-3">
                  <img src={"https://raw.githubusercontent.com/michaellay19/MOKSHA/main/MOKSHA%20PRADANA%20LOGO%20PRIMARY.png"} alt="Moksha Logo" className="mx-auto h-5 w-auto" />
                  <div>
                    <h1 className="text-lg font-bold text-gray-800">
                      {t("hello")}, {room.title || ""} {room.displayName || room.name}
                    </h1>
                    <p className="text-sm text-gray-500">{t("welcomeAboard")}</p>
                  </div>
                </div>
                <div className="flex items-center space-x-2 sm:space-x-4">
                  <button onClick={toggleCallStaff} className={`flex items-center space-x-2 px-3 py-2 text-sm font-semibold rounded-lg transition-colors shadow-md ${
                      isCalling
                        ? "bg-yellow-400 text-yellow-800 animate-pulse"
                        : "bg-red-600 hover:bg-red-700 text-white"
                    }`}
                  >
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                    </svg>
                    <span>{t(isCalling ? "cancelCall" : "callStaff")}</span>
                  </button>
                  
                  {/* Notification Bell */}
                  <div className="relative">
                    <button onClick={handleBellClick} className="p-2 rounded-full bg-gray-200 text-gray-600 hover:bg-gray-300 transition-colors">
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                      </svg>
                      {unreadCount > 0 && (
                        <span className="absolute -top-1 -right-1 flex h-5 w-5 items-center justify-center rounded-full bg-red-500 text-xs text-white">
                          {unreadCount}
                        </span>
                      )}
                    </button>
                    {showNotifications && (
                      <div className="absolute right-0 mt-2 w-72 bg-white rounded-md shadow-lg z-30 border">
                        <div className="p-3 font-bold border-b flex justify-between items-center">
                            <span>{t('notifications')}</span>
                            <button onClick={clearFinishedNotifications} className="text-xs bg-blue-500 text-white px-2 py-1 rounded hover:bg-blue-600">Clear Finished</button>
                        </div>
                        <div className="max-h-64 overflow-y-auto custom-scrollbar">
                          {notifications.length > 0 ? notifications.map(notif => (
                             <div key={notif.id} className="p-3 text-sm border-b hover:bg-gray-100">
                               <p className="font-semibold">
                                {
                                    (() => {
                                        const orderIdShort = notif.id.substring(0, 6).toUpperCase();
                                        const statusText = t(`status_${notif.status}`);
                                        if (notif.isNew) {
                                            return t('notification_new_order_detail').replace('{orderId}', orderIdShort);
                                        } else {
                                            return t('notification_status_update_detail').replace('{orderId}', orderIdShort).replace('{status}', statusText);
                                        }
                                    })()
                                }
                               </p>
                               <p className="text-xs text-gray-500">{notif.timestamp ? new Date(notif.timestamp.toDate()).toLocaleString() : ''}</p>
                             </div>
                          )) : <p className="p-3 text-sm text-gray-500">{t('noNewNotifications')}</p>}
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="relative">
                    <button onClick={() => setSettingsOpen((prev) => !prev)} className="p-2 rounded-full bg-gray-200 text-gray-600 hover:bg-gray-300 transition-colors">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                      </svg>
                    </button>
                    {settingsOpen && (
                      <div className="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg z-30">
                        <button onClick={() => { setLanguage((lang) => lang === "id" ? "en" : "id"); setSettingsOpen(false); }} className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center space-x-2">
                          {language === "id" ? <FlagUK /> : <FlagIndonesia />}
                          <span>{t("changeLanguage")}</span>
                        </button>
                        <button onClick={onLogout} className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center space-x-2">
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                          </svg>
                          <span>{t("logout")}</span>
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </header>
            <nav className="bg-blue-800 shadow-sm p-2 flex justify-around items-center gap-1 rounded-b-xl sticky top-[72px] z-10">
              <button onClick={() => setActiveTab("pesan")} className={`px-3 py-2 text-sm sm:text-base font-medium rounded-lg transition duration-200 border-b-4 ${ activeTab === "pesan" ? "border-teal-400 text-white" : "border-transparent text-blue-200 hover:text-white" }`} >
                {t("menu")}
              </button>
              <button onClick={() => setActiveTab("riwayat")} className={`px-3 py-2 text-sm sm:text-base font-medium rounded-lg transition duration-200 border-b-4 ${ activeTab === "riwayat" ? "border-teal-400 text-white" : "border-transparent text-blue-200 hover:text-white" }`} >
                {t("order")}
              </button>
              <button onClick={() => setActiveTab("keselamatan")} className={`px-3 py-2 text-sm sm:text-base font-medium rounded-lg transition duration-200 border-b-4 ${ activeTab === "keselamatan" ? "border-teal-400 text-white" : "border-transparent text-blue-200 hover:text-white" }`} >
                {t("safetyAboard")}
              </button>
              <button onClick={() => setActiveTab("chat")} className={`px-3 py-2 text-sm sm:text-base font-medium rounded-lg transition duration-200 border-b-4 ${ activeTab === "chat" ? "border-teal-400 text-white" : "border-transparent text-blue-200 hover:text-white" }`} >
                {t("chat")}
              </button>
            </nav>
            <main className="p-4 sm:p-6 max-w-7xl mx-auto w-full">
              {activeTab === "pesan" && <OrderItems />}
              {activeTab === "riwayat" && <OrderHistory />}
              {activeTab === "keselamatan" && <SafetyInfo />}
              {activeTab === "chat" && <RoomChat />}
            </main>
          </div>
        );
      }

      function OrderItems() {
        const { db, appId, loggedInRoom } = useContext(AppContext);
        const { t } = useTranslation();
        const [items, setItems] = useState([]);
        const [cart, setCart] = useState([]);
        const [itemAddOnSelections, setItemAddOnSelections] = useState({});
        const [showCartModal, setShowCartModal] = useState(false);
        const [notification, setNotification] = useState("");
        const categories = ["Makanan", "Minuman", "Dessert", "Alcohol", "Lainlain"];

        useEffect(() => {
          const itemsRef = collection(db, `artifacts/${appId}/public/data/items`);
          const q = query(itemsRef, orderBy("name"));
          const unsubscribe = onSnapshot(q, (snapshot) => {
            setItems(snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() })));
          });
          return () => unsubscribe();
        }, [db, appId]);

        const showNotification = (message) => {
          setNotification(message);
          setTimeout(() => setNotification(""), 2000);
        };

        const groupedItems = items.reduce((acc, item) => {
          const category = item.category || "Lainlain";
          (acc[category] = acc[category] || []).push(item);
          return acc;
        }, {});

        const toggleAddOn = (itemId, addOn) => {
          setItemAddOnSelections((prev) => {
            const currentSelections = prev[itemId] || [];
            const isSelected = currentSelections.some((a) => a.name === addOn.name);
            const newSelections = isSelected
              ? currentSelections.filter((a) => a.name !== addOn.name)
              : [...currentSelections, addOn];
            return { ...prev, [itemId]: newSelections };
          });
        };

        const addToCart = (item) => {
          const selectedAddOns = itemAddOnSelections[item.id] || [];
          const cartItem = { ...item, cartId: Date.now(), selectedAddOns, note: "" }; // Add note property
          setCart((prev) => [...prev, cartItem]);
          showNotification(`${item.name} ${t("itemAddedToCart")}`);
        };

        const removeFromCart = (cartId) => {
          setCart((prev) => prev.filter((item) => item.cartId !== cartId));
        };
        
        const handleItemNoteChange = (cartId, newNote) => {
            setCart(prevCart => 
                prevCart.map(item => 
                    item.cartId === cartId ? { ...item, note: newNote } : item
                )
            );
        };

        const placeOrder = async () => {
          if (cart.length === 0) return;
          const total = cart.reduce(
            (sum, item) =>
              sum +
              item.price +
              (item.selectedAddOns?.reduce((s, ao) => s + ao.price, 0) || 0),
            0
          );

          await addDoc(collection(db, `artifacts/${appId}/public/data/orders`), {
            roomNumber: loggedInRoom.name,
            items: cart,
            total: total,
            status: "Baru",
            timestamp: serverTimestamp(),
            isReadByCustomer: false, // NOTIFICATION FIX: Set to false to trigger notification
            isReadByAdmin: false,
            isNew: true,
          });
          setCart([]);
          setShowCartModal(false);
          showNotification(t("orderPlacedSuccessfully"));
        };

        return (
          <div className="relative">
            {categories.map(
              (category) =>
                groupedItems[category] &&
                groupedItems[category].length > 0 && (
                  <div key={category} className="mb-8">
                    <h3 className="text-2xl font-bold text-gray-800 mb-4 border-b-2 border-blue-600 pb-2">
                      {t(`category_${category}`)}
                    </h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {groupedItems[category].map((item) => (
                        <div key={item.id} className="bg-white border rounded-lg p-4 flex flex-col justify-between shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-200">
                          <div>
                            <h4 className="text-xl font-semibold">{item.name}</h4>
                            <p className="text-gray-600 text-sm mb-2">{item.description}</p>
                            <p className={`font-bold text-lg ${item.price === 0 ? "text-green-600" : "text-blue-600"}`}>
                              {item.price === 0 ? t("free") : `Rp${item.price.toLocaleString("id-ID")}`}
                            </p>
                            {item.addOns && item.addOns.length > 0 && (
                              <div className="mt-4 border-t border-gray-200 pt-3">
                                <p className="font-semibold text-sm mb-2">{t("chooseAddons")}:</p>
                                {item.addOns.map((addOn) => (
                                  <label key={addOn.name} className="flex items-center text-sm mb-1">
                                    <input type="checkbox" onChange={() => toggleAddOn(item.id, addOn)} className="form-checkbox h-4 w-4 text-blue-600 rounded"/>
                                    <span className="ml-2">
                                      {addOn.name} (+Rp{addOn.price.toLocaleString("id-ID")})
                                    </span>
                                  </label>
                                ))}
                              </div>
                            )}
                          </div>
                          <button onClick={() => addToCart(item)} className="mt-4 w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition-colors">
                            {t("addToCart")}
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                )
            )}
            {cart.length > 0 && (
              <div className="fixed bottom-6 right-6 z-30">
                <button onClick={() => setShowCartModal(true)} className="bg-teal-500 text-white rounded-full py-3 px-5 shadow-lg flex items-center animate-pulse">
                  <svg className="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                  </svg>
                  {cart.length} {t("itemsInCart")}
                </button>
              </div>
            )}
            {showCartModal && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                <div className="bg-white p-6 rounded-lg shadow-xl w-full max-w-lg">
                  <h3 className="text-2xl font-bold mb-4">{t("yourCart")}</h3>
                  <div className="space-y-4 mb-4 max-h-64 overflow-y-auto custom-scrollbar pr-2">
                    {cart.map((item) => (
                      <div key={item.cartId} className="border-b pb-3">
                        <div className="flex justify-between items-start">
                           <div>
                              <p className="font-semibold">{item.name}</p>
                              {item.selectedAddOns.length > 0 && (
                                <ul className="text-xs text-gray-500 list-disc list-inside ml-2">
                                  {item.selectedAddOns.map((ao) => (
                                    <li key={ao.name}>{ao.name}</li>
                                  ))}
                                </ul>
                              )}
                           </div>
                           <div className="flex items-center space-x-4">
                              <p className="whitespace-nowrap">
                                Rp{(item.price + item.selectedAddOns.reduce((s, ao) => s + ao.price, 0)).toLocaleString("id-ID")}
                              </p>
                              <button onClick={() => removeFromCart(item.cartId)} className="text-red-500 hover:text-red-700 font-bold">
                                {t("delete")}
                              </button>
                           </div>
                        </div>
                        <input
                          type="text"
                          placeholder={t('itemNotePlaceholder')}
                          value={item.note}
                          onChange={(e) => handleItemNoteChange(item.cartId, e.target.value)}
                          className="mt-2 w-full p-1 border rounded text-sm"
                        />
                      </div>
                    ))}
                  </div>
                  <div className="flex justify-between font-bold text-xl mt-4">
                    <p>{t("total")}:</p>
                    <p>
                      Rp{cart.reduce((sum, item) => sum + item.price + item.selectedAddOns.reduce((s, ao) => s + ao.price, 0), 0).toLocaleString("id-ID")}
                    </p>
                  </div>
                  <div className="mt-6 flex justify-end space-x-2">
                    <button onClick={() => setShowCartModal(false)} className="bg-gray-300 px-4 py-2 rounded">
                      {t("close")}
                    </button>
                    <button onClick={placeOrder} className="bg-green-600 text-white px-4 py-2 rounded">
                      {t("placeOrder")}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      function OrderHistory() {
        const { db, appId, loggedInRoom } = useContext(AppContext);
        const { t } = useTranslation();
        const [orders, setOrders] = useState([]);
        const [loading, setLoading] = useState(true);
        const [showCancelModal, setShowCancelModal] = useState(false);
        const [orderToCancel, setOrderToCancel] = useState(null);

        useEffect(() => {
          if (!db || !loggedInRoom) return;
          const ordersRef = collection(db, `artifacts/${appId}/public/data/orders`);
          const q = query(ordersRef, where("roomNumber", "==", loggedInRoom.name));
          const unsubscribe = onSnapshot(q, (snapshot) => {
            const fetchedOrders = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
            fetchedOrders.sort((a, b) => (b.timestamp?.toDate() || 0) - (a.timestamp?.toDate() || 0));
            setOrders(fetchedOrders);
            setLoading(false);
          });
          return () => unsubscribe();
        }, [db, appId, loggedInRoom]);

        const confirmCancelOrder = (orderId) => {
          setOrderToCancel(orderId);
          setShowCancelModal(true);
        };

        const handleCancelOrder = async () => {
          if (!orderToCancel) return;
          const orderRef = doc(db, `artifacts/${appId}/public/data/orders`, orderToCancel);
          await updateDoc(orderRef, { status: "Dibatalkan", isReadByCustomer: false, isNew: false });
          setShowCancelModal(false);
          setOrderToCancel(null);
        };

        if (loading) return <p>{t("loadingHistory")}...</p>;

        return (
          <div className="bg-white p-6 rounded-xl shadow-lg">
            <h2 className="text-3xl font-bold text-gray-800 mb-6">{t("yourOrderHistory")}</h2>
            {orders.length === 0 ? (
              <p>{t("noOrdersYet")}.</p>
            ) : (
              <div className="space-y-4">
                {orders.map((order) => (
                  <div key={order.id} className="border rounded-lg p-4">
                    <div className="flex justify-between items-start mb-2">
                      <div>
                        <p className="font-bold">
                          {t("order")} #{order.id.substring(0, 6)}
                        </p>
                        <p className="text-sm text-gray-500">
                          {t("orderOn")}{" "}
                          {order.timestamp ? new Date(order.timestamp.toDate()).toLocaleString() : '...'}
                        </p>
                      </div>
                      <span className={`px-3 py-1 text-sm font-semibold rounded-full ${
                          order.status === "Selesai"
                            ? "bg-green-100 text-green-800"
                            : order.status === "Dibatalkan"
                            ? "bg-red-100 text-red-800"
                            : "bg-yellow-100 text-yellow-800"
                        }`}
                      >
                        {t(`status_${order.status}`)}
                      </span>
                    </div>
                    <ul className="list-disc list-inside ml-4 mb-2 text-sm">
                      {order.items.map((item) => (
                        <li key={item.cartId}>
                          {item.name}
                          {item.note && <span className="text-gray-500 text-xs italic"> - "{item.note}"</span>}
                        </li>
                      ))}
                    </ul>
                    <div className="border-t pt-2 flex justify-between items-center">
                      <p className="font-bold text-lg">
                        {t("total")}: Rp{order.total.toLocaleString("id-ID")}
                      </p>
                      {(order.status === "Baru" || order.status === "Diproses") && (
                        <button onClick={() => confirmCancelOrder(order.id)} className="bg-red-500 text-white text-xs font-bold py-1 px-3 rounded hover:bg-red-600">
                          {t("cancelOrder")}
                        </button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
            <ConfirmationModal
              show={showCancelModal}
              message={t("confirmCancel")}
              onConfirm={handleCancelOrder}
              onCancel={() => setShowCancelModal(false)}
            />
          </div>
        );
      }

      function SafetyInfo() {
        const { t } = useTranslation();
        return (
            <div className="bg-white p-6 rounded-xl shadow-lg">
                <div className="text-center mb-8">
                    <h2 className="text-3xl font-bold text-gray-800 mb-2">{t('safetyTitle')}</h2>
                    <p className="text-md text-gray-600">{t('safetySubtitle')}</p>
                </div>

                <div className="space-y-6">
                    {/* Muster Station Card */}
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
                        <h3 className="text-xl font-bold text-blue-800 mb-2">{t('musterDrillTitle')}</h3>
                        <p className="mb-3 text-blue-900">{t('musterDrillInfo')}</p>
                        <div className="bg-white p-3 rounded-lg text-center">
                            <p className="font-semibold text-blue-700">{t('musterStation')}</p>
                            <p className="text-2xl font-bold text-blue-900">{t('musterStationLocation')}</p>
                        </div>
                    </div>

                    {/* Emergency Procedures Card */}
                    <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg">
                        <h3 className="text-xl font-bold text-red-800 mb-3">{t('emergencyProceduresTitle')}</h3>
                        <ul className="space-y-3 text-red-900">
                            <li className="flex items-start"><span className="text-red-500 mr-3 mt-1">&#10148;</span><span>{t('emergencyStep1')}</span></li>
                            <li className="flex items-start"><span className="text-red-500 mr-3 mt-1">&#10148;</span><span>{t('emergencyStep2')}</span></li>
                            <li className="flex items-start"><span className="text-red-500 mr-3 mt-1">&#10148;</span><span>{t('emergencyStep3')}</span></li>
                        </ul>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Shipwide Safety Card */}
                        <div className="bg-gray-50 p-4 rounded-lg border">
                            <h3 className="text-xl font-bold text-gray-700 mb-3">{t('shipwideSafetyTitle')}</h3>
                            <ul className="space-y-2 text-gray-600">
                                <li className="flex items-center"><span className="text-green-500 mr-2">&#10004;</span>{t('shipwideFeature1')}</li>
                                <li className="flex items-center"><span className="text-green-500 mr-2">&#10004;</span>{t('shipwideFeature2')}</li>
                                <li className="flex items-center"><span className="text-green-500 mr-2">&#10004;</span>{t('shipwideFeature3')}</li>
                            </ul>
                        </div>
                        {/* In-Stateroom Safety Card */}
                        <div className="bg-gray-50 p-4 rounded-lg border">
                            <h3 className="text-xl font-bold text-gray-700 mb-3">{t('inStateroomSafetyTitle')}</h3>
                            <ul className="space-y-2 text-gray-600">
                                <li className="flex items-center"><span className="text-green-500 mr-2">&#10004;</span>{t('inStateroomFeature1')}</li>
                                <li className="flex items-center"><span className="text-green-500 mr-2">&#10004;</span>{t('inStateroomFeature2')}</li>
                            </ul>
                        </div>
                    </div>
                    
                    {/* Assistance Card */}
                    <div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg text-center">
                        <h3 className="text-xl font-bold text-yellow-800 mb-2">{t('needAssistanceTitle')}</h3>
                        <p className="text-yellow-700">{t('needAssistanceInfo')}</p>
                    </div>
                </div>
            </div>
        );
      }


      function RoomChat() {
        const { db, appId, loggedInRoom } = useContext(AppContext);
        const { t } = useTranslation();
        const [messages, setMessages] = useState([]);
        const [newMessage, setNewMessage] = useState("");
        const messagesEndRef = useRef(null);

        useEffect(() => {
          if (!db || !loggedInRoom) return;
          const chatsRef = collection(db, `artifacts/${appId}/public/data/chats`);
          const q = query(chatsRef, where("roomNumber", "==", loggedInRoom.name));
          const unsubscribe = onSnapshot(q, (snapshot) => {
            const fetchedMessages = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
            fetchedMessages.sort((a, b) => {
              const timeA = a.timestamp ? a.timestamp.toDate() : new Date(0);
              const timeB = b.timestamp ? b.timestamp.toDate() : new Date(0);
              return timeA - timeB;
            });
            setMessages(fetchedMessages);
          });
          return () => unsubscribe();
        }, [db, appId, loggedInRoom]);

        useEffect(() => {
          messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
        }, [messages]);

        const handleSendMessage = async () => {
          if (!newMessage.trim()) return;
          await addDoc(collection(db, `artifacts/${appId}/public/data/chats`), {
            roomNumber: loggedInRoom.name,
            sender: loggedInRoom.name,
            message: newMessage.trim(),
            timestamp: serverTimestamp(),
            isReadByAdmin: false,
          });
          setNewMessage("");
        };

        return (
          <div className="bg-white p-6 rounded-xl shadow-lg flex flex-col h-[70vh]">
            <h2 className="text-3xl font-bold text-gray-800 mb-6">{t("chatWithAdminTitle")}</h2>
            <div className="flex-grow overflow-y-auto border border-gray-200 rounded-lg p-4 mb-4 bg-gray-50 custom-scrollbar">
              {messages.map((msg) => (
                <div key={msg.id} className={`flex mb-3 ${ msg.sender === "Admin" ? "justify-start" : "justify-end" }`}>
                  <div className={`p-3 rounded-lg max-w-[70%] ${ msg.sender === "Admin" ? "bg-gray-300 text-gray-800" : "bg-blue-500 text-white" }`}>
                    <p className="font-bold text-sm">{msg.sender === "Admin" ? t("admin") : t("you")}</p>
                    <p>{msg.message}</p>
                    <span className="text-xs opacity-75 mt-1 block">
                      {msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString() : "sending..."}
                    </span>
                  </div>
                </div>
              ))}
              <div ref={messagesEndRef} />
            </div>
            <div className="flex">
              <input
                type="text"
                value={newMessage}
                onChange={(e) => setNewMessage(e.target.value)}
                onKeyPress={(e) => e.key === "Enter" && handleSendMessage()}
                className="flex-grow p-3 border rounded-l-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder={t("typeYourMessage")}
              />
              <button onClick={handleSendMessage} className="bg-blue-600 text-white px-6 rounded-r-md hover:bg-blue-700">
                {t("send")}
              </button>
            </div>
          </div>
        );
      }

      const container = document.getElementById("root");
      const root = ReactDOM.createRoot(container);
      root.render(
        <LanguageProvider>
          <App />
        </LanguageProvider>
      );
    </script>
  </body>
</html>
