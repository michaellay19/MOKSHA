<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sistem Kabin Kapal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <!-- Tone.js for sound effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/javascript">
        // --- KONFIGURASI FIREBASE ANDA SUDAH DIMASUKKAN ---
        const firebaseConfig = {
            apiKey: "AIzaSyDVvdwyTXNZC0cFrwrLI2oq47uvbbtTtzw",
            authDomain: "project-moksha-a59af.firebaseapp.com",
            projectId: "project-moksha-a59af",
            storageBucket: "project-moksha-a59af.firebasestorage.app",
            messagingSenderId: "565916093642",
            appId: "1:565916093642:web:9f3e6b03b1790e8b793833",
            measurementId: "G-LBL8336HC6"
        };
        // ----------------------------------------------------
        window.__firebase_config = JSON.stringify(firebaseConfig);
        window.__app_id = firebaseConfig.appId;
        window.__initial_auth_token = null; 
    </script>

    <script type="text/babel">
        const { initializeApp } = firebase;
        const { onAuthStateChanged } = firebase.auth;
        const { useState, useEffect, createContext, useContext, useRef } = React;

        const AppContext = createContext();
        
        function ConfirmationModal({ message, onConfirm, onCancel, show }) {
            if (!show) return null;
            return (
                <div className="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm text-center">
                        <p className="text-lg text-gray-800 mb-6">{message}</p>
                        <div className="flex justify-center space-x-4">
                            <button onClick={onCancel} className="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg transition duration-300">Batal</button>
                            <button onClick={onConfirm} className="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition duration-300">Konfirmasi</button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                try {
                    const config = JSON.parse(window.__firebase_config);
                    if (!config || config.apiKey === "YOUR_API_KEY") {
                        setError("Konfigurasi Firebase belum diatur. Harap edit file HTML ini dan masukkan kredensial Firebase Anda.");
                        setLoading(false);
                        return;
                    }
                    const app = initializeApp(config);
                    setDb(firebase.firestore(app));
                    const auth = firebase.auth(app);
                    auth.signInAnonymously().catch(err => console.error("Gagal login anonim:", err));
                    setLoading(false);
                } catch (e) {
                    console.error("Error inisialisasi Firebase:", e);
                    setError("Gagal memuat Firebase. Periksa konsol untuk detail.");
                    setLoading(false);
                }
            }, []);

            if (loading) return <div className="min-h-screen flex items-center justify-center">Memuat...</div>;
            if (error) return <div className="min-h-screen flex items-center justify-center p-4 bg-red-100 text-red-700">{error}</div>;

            return (
                <AppContext.Provider value={{ db, appId: window.__app_id }}>
                    {isAdminLoggedIn ? <AdminDashboard onLogout={() => setIsAdminLoggedIn(false)} /> : <AdminLogin onLogin={() => setIsAdminLoggedIn(true)} />}
                </AppContext.Provider>
            );
        }

        function AdminLogin({ onLogin }) {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            
            const handleLogin = async () => {
                if (password === 'admin123') {
                    if (Tone.context.state !== 'running') {
                        await Tone.start();
                        console.log("Audio context started on login.");
                    }
                    onLogin();
                } else {
                    setError('Kata sandi salah.');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-800 to-gray-900">
                    <div className="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm">
                        <h2 className="text-4xl font-bold text-center text-gray-800 mb-6">🚢 Panel Admin</h2>
                        {error && <p className="text-red-500 text-center mb-4">{error}</p>}
                        <input
                            type="password"
                            placeholder="Masukkan Kata Sandi"
                            value={password}
                            onChange={(e) => setPassword(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                            className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"
                        />
                        <button onClick={handleLogin} className="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300">
                            Masuk
                        </button>
                    </div>
                </div>
            );
        }
        
        function AdminDashboard({ onLogout }) {
            const [activeTab, setActiveTab] = useState('panggilan');
            const { db, appId } = useContext(AppContext);
            const [callingRooms, setCallingRooms] = useState([]);
            const [unreadChatRooms, setUnreadChatRooms] = useState(new Set());
            const [newOrdersCount, setNewOrdersCount] = useState(0);
            
            const [isAlarmPlaying, setIsAlarmPlaying] = useState(false);
            const alarmSynth = useRef(null);
            const chatSynth = useRef(null);
            const alarmLoop = useRef(null);
            const prevUnreadCount = useRef(0);

            useEffect(() => {
                alarmSynth.current = new Tone.Synth({ oscillator: { type: "square" } }).toDestination();
                chatSynth.current = new Tone.Synth().toDestination();
                alarmLoop.current = new Tone.Loop(time => {
                    alarmSynth.current.triggerAttackRelease("A5", "16n", time);
                }, "4n");
                
                return () => {
                    if (Tone.Transport.state === 'started') {
                        Tone.Transport.stop();
                    }
                    alarmLoop.current?.dispose();
                };
            }, []);

            useEffect(() => {
                if (callingRooms.length > 0 && !isAlarmPlaying) {
                    alarmLoop.current.start(0);
                    Tone.Transport.start();
                    setIsAlarmPlaying(true);
                } else if (callingRooms.length === 0 && isAlarmPlaying) {
                    Tone.Transport.stop();
                    alarmLoop.current.stop();
                    setIsAlarmPlaying(false);
                }
            }, [callingRooms, isAlarmPlaying]);

            useEffect(() => {
                if (unreadChatRooms.size > prevUnreadCount.current) {
                    if (chatSynth.current && Tone.context.state === 'running') {
                        const now = Tone.now();
                        chatSynth.current.triggerAttackRelease("C5", "8n", now);
                        chatSynth.current.triggerAttackRelease("G5", "8n", now + 0.2);
                    }
                }
                prevUnreadCount.current = unreadChatRooms.size;
            }, [unreadChatRooms]);

            useEffect(() => {
                if (!db) return;
                
                const roomsRef = db.collection(`artifacts/${appId}/public/data/rooms`);
                const qRooms = roomsRef.where("isCalling", "==", true);
                const unsubRooms = qRooms.onSnapshot((snapshot) => {
                    setCallingRooms(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const chatsRef = db.collection(`artifacts/${appId}/public/data/chats`);
                const qChats = chatsRef.where("isReadByAdmin", "==", false);
                const unsubChats = qChats.onSnapshot(snapshot => {
                    const roomsWithUnreadMessages = new Set(snapshot.docs.filter(doc => doc.data().sender !== 'Admin').map(doc => doc.data().roomNumber));
                    setUnreadChatRooms(roomsWithUnreadMessages);
                });

                const ordersRef = db.collection(`artifacts/${appId}/public/data/orders`);
                const qOrders = ordersRef.where("status", "==", "Baru");
                const unsubOrders = qOrders.onSnapshot(snapshot => {
                    setNewOrdersCount(snapshot.size);
                });

                return () => {
                    unsubRooms();
                    unsubChats();
                    unsubOrders();
                };
            }, [db, appId]);

            const handleReadChat = (roomNumber) => {
                const chatsRef = db.collection(`artifacts/${appId}/public/data/chats`);
                const q = chatsRef.where("roomNumber", "==", roomNumber);
                q.get().then(snapshot => {
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => {
                        if (doc.data().isReadByAdmin === false && doc.data().sender !== 'Admin') {
                           batch.update(doc.ref, { isReadByAdmin: true });
                        }
                    });
                    batch.commit().catch(err => console.error("Error marking chat as read:", err));
                });
            };

            return (
                <div className="flex h-screen bg-gray-200">
                    <aside className="w-64 bg-gray-800 text-white flex flex-col">
                        <div className="p-4 border-b border-gray-700">
                            <h1 className="text-2xl font-bold">Panel Kapten</h1>
                        </div>
                        <nav className="flex-grow">
                            <button onClick={() => setActiveTab('panggilan')} className={`w-full text-left p-4 hover:bg-gray-700 flex items-center justify-between ${activeTab === 'panggilan' ? 'bg-blue-600' : ''}`}>
                                <span>Panggilan Kamar</span>
                                {callingRooms.length > 0 && <span className="bg-red-500 text-white text-xs font-bold rounded-full h-6 w-6 flex items-center justify-center animate-pulse">{callingRooms.length}</span>}
                            </button>
                            <button onClick={() => setActiveTab('pesanan')} className={`w-full text-left p-4 hover:bg-gray-700 flex items-center justify-between ${activeTab === 'pesanan' ? 'bg-blue-600' : ''}`}>
                                <span>Kelola Pesanan</span>
                                {newOrdersCount > 0 && <span className="bg-blue-500 text-white text-xs font-bold rounded-full h-6 w-6 flex items-center justify-center">{newOrdersCount}</span>}
                            </button>
                            <button onClick={() => setActiveTab('menu')} className={`w-full text-left p-4 hover:bg-gray-700 ${activeTab === 'menu' ? 'bg-blue-600' : ''}`}>Kelola Menu</button>
                            <button onClick={() => setActiveTab('kamar')} className={`w-full text-left p-4 hover:bg-gray-700 ${activeTab === 'kamar' ? 'bg-blue-600' : ''}`}>Kelola Kamar</button>
                            <button onClick={() => setActiveTab('chat')} className={`w-full text-left p-4 hover:bg-gray-700 flex items-center justify-between ${activeTab === 'chat' ? 'bg-blue-600' : ''}`}>
                                <span>Kelola Chat</span>
                                {unreadChatRooms.size > 0 && <span className="bg-red-500 text-white text-xs font-bold rounded-full h-6 w-6 flex items-center justify-center">{unreadChatRooms.size}</span>}
                            </button>
                        </nav>
                        <div className="p-4 border-t border-gray-700">
                            <button onClick={onLogout} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">Logout</button>
                        </div>
                    </aside>
                    <main className="flex-1 p-8 overflow-y-auto">
                        {activeTab === 'panggilan' && <ManageCalls callingRooms={callingRooms} />}
                        {activeTab === 'pesanan' && <ManageOrders />}
                        {activeTab === 'menu' && <ManageMenu />}
                        {activeTab === 'kamar' && <ManageRooms />}
                        {activeTab === 'chat' && <AdminChat onRoomSelect={handleReadChat} unreadRooms={unreadChatRooms} />}
                    </main>
                </div>
            );
        }

        function ManageCalls({ callingRooms }) {
            const { db, appId } = useContext(AppContext);
            const handleAcknowledge = async (roomId) => {
                const roomRef = db.doc(`artifacts/${appId}/public/data/rooms/${roomId}`);
                await roomRef.update({ isCalling: false });
            };
            return (
                <div>
                    <h2 className="text-3xl font-bold mb-6">Panggilan dari Kamar</h2>
                    {callingRooms.length === 0 ? (<p className="text-gray-600">Tidak ada panggilan saat ini.</p>) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {callingRooms.map(room => (
                                <div key={room.id} className="bg-red-100 border-2 border-red-500 rounded-lg p-6 shadow-lg animate-pulse">
                                    <h3 className="text-2xl font-bold text-red-800">Panggilan Darurat!</h3>
                                    <p className="text-red-700 mt-2 text-lg">Kamar <span className="font-bold">{room.displayName || room.name}</span> membutuhkan bantuan.</p>
                                    <button onClick={() => handleAcknowledge(room.id)} className="mt-4 w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition-colors">Tandai Selesai</button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        
        function ManageOrders() {
            const { db, appId } = useContext(AppContext);
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('Semua');

            useEffect(() => {
                if (!db) return;
                const ordersRef = db.collection(`artifacts/${appId}/public/data/orders`).orderBy('timestamp', 'desc');
                const unsubscribe = ordersRef.onSnapshot(snapshot => {
                    setOrders(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [db, appId]);
            
            const updateOrderStatus = async (orderId, newStatus) => {
                const orderRef = db.doc(`artifacts/${appId}/public/data/orders/${orderId}`);
                await orderRef.update({ status: newStatus });
            };

            const filteredOrders = orders.filter(order => filter === 'Semua' || order.status === filter);

            if (loading) return <p>Memuat pesanan...</p>;

            return (
                <div>
                    <h2 className="text-3xl font-bold mb-6">Kelola Pesanan</h2>
                    <div className="flex space-x-2 mb-4">
                        {['Semua', 'Baru', 'Diproses', 'Selesai', 'Dibatalkan'].map(status => (
                            <button key={status} onClick={() => setFilter(status)} className={`px-4 py-2 rounded-lg ${filter === status ? 'bg-blue-600 text-white' : 'bg-white'}`}>{status}</button>
                        ))}
                    </div>
                    <div className="space-y-4">
                        {filteredOrders.length === 0 ? <p>Tidak ada pesanan dengan status "{filter}".</p> : filteredOrders.map(order => (
                            <div key={order.id} className="bg-white p-4 rounded-lg shadow">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold text-lg">Pesanan dari Kamar {order.roomNumber}</h3>
                                    <p className="text-sm text-gray-500">{new Date(order.timestamp.toDate()).toLocaleString()}</p>
                                </div>
                                <div className="border-t border-b py-2 my-2">
                                    {order.items.map(item => (
                                        <div key={item.cartId} className="flex justify-between text-sm">
                                            <span>{item.name} {item.selectedAddOns.length > 0 && `(${item.selectedAddOns.map(ao => ao.name).join(', ')})`}</span>
                                            <span>Rp{item.price.toLocaleString('id-ID')}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-between items-center mt-2">
                                    <p className="font-bold">Total: Rp{order.total.toLocaleString('id-ID')}</p>
                                    <div className="flex items-center space-x-2">
                                        <label htmlFor={`status-${order.id}`} className="text-sm">Status:</label>
                                        <select 
                                            id={`status-${order.id}`}
                                            value={order.status} 
                                            onChange={(e) => updateOrderStatus(order.id, e.target.value)}
                                            className="p-1 border rounded"
                                        >
                                            <option value="Baru">Baru</option>
                                            <option value="Diproses">Diproses</option>
                                            <option value="Selesai">Selesai</option>
                                            <option value="Dibatalkan">Dibatalkan</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ItemForm({ item, isEditing, onSubmit, onCancel, handleInputChange, handleAddOnFieldChange, handleAddAddOnField, handleRemoveAddOnField, categories }) {
            return (
                <form onSubmit={onSubmit} className="bg-white p-6 rounded-lg shadow-md mb-8">
                    <h3 className="text-xl font-bold mb-4">{isEditing ? "Ubah Item Menu" : "Tambah Item Menu Baru"}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" name="name" value={item.name} onChange={(e) => handleInputChange(e, isEditing)} placeholder="Nama Item (e.g., Indomie Goreng)" className="p-2 border rounded" required />
                        <input type="number" name="price" value={item.price} onChange={(e) => handleInputChange(e, isEditing)} placeholder="Harga (0 untuk Gratis)" className="p-2 border rounded" required />
                        <textarea name="description" value={item.description} onChange={(e) => handleInputChange(e, isEditing)} placeholder="Deskripsi (Opsional)" className="p-2 border rounded md:col-span-2" />
                        <select name="category" value={item.category} onChange={(e) => handleInputChange(e, isEditing)} className="p-2 border rounded">
                            {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                        </select>
                    </div>
                    <div className="mt-6">
                        <h4 className="font-bold mb-2">Add-ons</h4>
                        {(item.addOns || []).map((addOn, index) => (
                            <div key={index} className="flex items-center space-x-2 mb-2">
                                <input type="text" name="name" value={addOn.name} onChange={(e) => handleAddOnFieldChange(index, e, isEditing)} placeholder="Nama Add-on (e.g., Telur)" className="flex-grow p-2 border rounded" />
                                <input type="number" name="price" value={addOn.price} onChange={(e) => handleAddOnFieldChange(index, e, isEditing)} placeholder="Harga Add-on" className="w-32 p-2 border rounded" />
                                <button type="button" onClick={() => handleRemoveAddOnField(index, isEditing)} className="bg-red-500 text-white px-3 py-1 rounded">&times;</button>
                            </div>
                        ))}
                        <button type="button" onClick={() => handleAddAddOnField(isEditing)} className="bg-gray-200 px-4 py-2 rounded text-sm mt-2">Tambah Add-on</button>
                    </div>
                    <div className="mt-6 flex space-x-2">
                        <button type="submit" className="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">{isEditing ? "Simpan Perubahan" : "Tambah Item"}</button>
                        {isEditing && <button type="button" onClick={onCancel} className="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600">Batal</button>}
                    </div>
                </form>
            );
        }

        function ManageMenu() {
            const { db, appId } = useContext(AppContext);
            const [items, setItems] = useState([]);
            const [newItem, setNewItem] = useState({ name: '', description: '', price: '', category: 'Makanan', addOns: [] });
            const [editingItem, setEditingItem] = useState(null);
            const [showDeleteModal, setShowDeleteModal] = useState(false);
            const [itemToDelete, setItemToDelete] = useState(null);

            const categories = ['Makanan', 'Minuman', 'Dessert', 'Alcohol', 'Lain-lain'];

            useEffect(() => {
                const itemsRef = db.collection(`artifacts/${appId}/public/data/items`).orderBy('name');
                const unsubscribe = itemsRef.onSnapshot(snapshot => {
                    setItems(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsubscribe();
            }, [db, appId]);

            const handleInputChange = (e, isEditing = false) => {
                const { name, value } = e.target;
                const targetState = isEditing ? editingItem : newItem;
                const setState = isEditing ? setEditingItem : setNewItem;
                setState({ ...targetState, [name]: value });
            };

            const handleAddOnFieldChange = (index, e, isEditing = false) => {
                const { name, value } = e.target;
                const targetState = isEditing ? editingItem : newItem;
                const setState = isEditing ? setEditingItem : setNewItem;
                const updatedAddOns = targetState.addOns.map((addOn, i) => i === index ? { ...addOn, [name]: value } : addOn);
                setState({ ...targetState, addOns: updatedAddOns });
            };

            const handleAddAddOnField = (isEditing = false) => {
                const targetState = isEditing ? editingItem : newItem;
                const setState = isEditing ? setEditingItem : setNewItem;
                setState({ ...targetState, addOns: [...(targetState.addOns || []), { name: '', price: '' }] });
            };

            const handleRemoveAddOnField = (index, isEditing = false) => {
                const targetState = isEditing ? editingItem : newItem;
                const setState = isEditing ? setEditingItem : setNewItem;
                const updatedAddOns = targetState.addOns.filter((_, i) => i !== index);
                setState({ ...targetState, addOns: updatedAddOns });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const itemData = editingItem || newItem;
                if (!itemData.name || !itemData.price) return alert("Nama dan Harga tidak boleh kosong.");
                
                const price = parseFloat(itemData.price);
                if (isNaN(price)) return alert("Harga harus berupa angka.");

                const finalAddOns = (itemData.addOns || [])
                    .filter(ao => ao.name && ao.price)
                    .map(ao => ({ name: ao.name, price: parseFloat(ao.price) }));

                const dataToSave = {
                    name: itemData.name,
                    description: itemData.description || '',
                    price: price,
                    category: itemData.category,
                    addOns: finalAddOns
                };

                if (editingItem) {
                    await db.doc(`artifacts/${appId}/public/data/items/${editingItem.id}`).update(dataToSave);
                    setEditingItem(null);
                } else {
                    await db.collection(`artifacts/${appId}/public/data/items`).add(dataToSave);
                    setNewItem({ name: '', description: '', price: '', category: 'Makanan', addOns: [] });
                }
            };

            const handleDelete = async () => {
                if (!itemToDelete) return;
                await db.doc(`artifacts/${appId}/public/data/items/${itemToDelete.id}`).delete();
                setShowDeleteModal(false);
                setItemToDelete(null);
            };

            return (
                <div>
                    <h2 className="text-3xl font-bold mb-6">Kelola Menu</h2>
                    {editingItem ? (
                        <ItemForm 
                            item={editingItem} 
                            isEditing={true} 
                            onSubmit={handleSubmit} 
                            onCancel={() => setEditingItem(null)}
                            handleInputChange={handleInputChange}
                            handleAddOnFieldChange={handleAddOnFieldChange}
                            handleAddAddOnField={handleAddAddOnField}
                            handleRemoveAddOnField={handleRemoveAddOnField}
                            categories={categories}
                        />
                    ) : (
                        <ItemForm 
                            item={newItem} 
                            isEditing={false} 
                            onSubmit={handleSubmit}
                            handleInputChange={handleInputChange}
                            handleAddOnFieldChange={handleAddOnFieldChange}
                            handleAddAddOnField={handleAddAddOnField}
                            handleRemoveAddOnField={handleRemoveAddOnField}
                            categories={categories}
                        />
                    )}
                    
                    <div className="bg-white p-6 rounded-lg shadow-md">
                        <h3 className="text-xl font-bold mb-4">Daftar Menu</h3>
                        <div className="space-y-3">
                            {items.map(item => (
                                <div key={item.id} className="p-3 bg-gray-50 rounded flex justify-between items-start">
                                    <div>
                                        <p className="font-bold text-gray-800">{item.name} <span className="text-sm font-normal text-gray-500">({item.category})</span></p>
                                        <p className="text-sm text-gray-600">{item.description}</p>
                                        <p className={`font-semibold mt-1 ${item.price === 0 ? 'text-green-600' : 'text-blue-600'}`}>
                                            {item.price === 0 ? "Gratis" : `Rp${item.price.toLocaleString('id-ID')}`}
                                        </p>
                                        {item.addOns && item.addOns.length > 0 && (
                                            <ul className="text-xs list-disc list-inside mt-1">
                                                {item.addOns.map(ao => <li key={ao.name}>{ao.name} (+Rp{ao.price.toLocaleString('id-ID')})</li>)}
                                            </ul>
                                        )}
                                    </div>
                                    <div className="flex space-x-2 flex-shrink-0">
                                        <button onClick={() => setEditingItem(item)} className="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1 rounded text-sm">Ubah</button>
                                        <button onClick={() => { setItemToDelete(item); setShowDeleteModal(true); }} className="bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded text-sm">Hapus</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <ConfirmationModal show={showDeleteModal} message={`Anda yakin ingin menghapus item ${itemToDelete?.name}?`} onConfirm={handleDelete} onCancel={() => setShowDeleteModal(false)} />
                </div>
            );
        }

        function ManageRooms() {
            const { db, appId } = useContext(AppContext);
            const [rooms, setRooms] = useState([]);
            const [editingRoom, setEditingRoom] = useState(null);
            const [newName, setNewName] = useState('');
            const [newRoomName, setNewRoomName] = useState('');
            const [showDeleteModal, setShowDeleteModal] = useState(false);
            const [roomToDelete, setRoomToDelete] = useState(null);

            useEffect(() => {
                const roomsRef = db.collection(`artifacts/${appId}/public/data/rooms`);
                const q = roomsRef.orderBy("name");
                const unsubscribe = q.onSnapshot((snapshot) => {
                    setRooms(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsubscribe();
            }, [db, appId]);
            
            const handleAddRoom = async () => {
                if (!newRoomName.trim()) return alert("Nama kamar baru tidak boleh kosong.");
                const roomNameUpper = newRoomName.trim().toUpperCase();
                
                const roomsRef = db.collection(`artifacts/${appId}/public/data/rooms`);
                const q = roomsRef.where("name", "==", roomNameUpper);
                const snapshot = await q.get();

                if (!snapshot.empty) return alert(`Kamar dengan nama ${roomNameUpper} sudah ada.`);

                await roomsRef.add({
                    name: roomNameUpper,
                    displayName: roomNameUpper,
                    isCalling: false
                });
                setNewRoomName('');
            };

            const handleDeleteRoom = async () => {
                if (!roomToDelete) return;
                await db.doc(`artifacts/${appId}/public/data/rooms/${roomToDelete.id}`).delete();
                setShowDeleteModal(false);
                setRoomToDelete(null);
            };

            const handleSaveName = async () => {
                if (!editingRoom || !newName.trim()) return;
                const roomRef = db.doc(`artifacts/${appId}/public/data/rooms/${editingRoom.id}`);
                await roomRef.update({ displayName: newName.trim() });
                setEditingRoom(null);
                setNewName('');
            };

            return (
                <div>
                    <h2 className="text-3xl font-bold mb-6">Kelola Kamar</h2>
                    
                    <div className="bg-white p-6 rounded-lg shadow-md mb-8">
                        <h3 className="text-xl font-bold mb-4">Tambah Kamar Baru</h3>
                        <div className="flex space-x-2">
                            <input 
                                type="text"
                                value={newRoomName}
                                onChange={(e) => setNewRoomName(e.target.value)}
                                className="w-full p-2 border rounded"
                                placeholder="Nama Kamar Baru (e.g., KAMAR 11)"
                            />
                            <button onClick={handleAddRoom} className="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Tambah</button>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-lg shadow-md">
                        <h3 className="text-xl font-bold mb-4">Daftar Kamar</h3>
                        <ul className="space-y-3">
                            {rooms.map(room => (
                                <li key={room.id} className="flex items-center justify-between p-3 bg-gray-50 rounded">
                                    <div>
                                        <span className="font-bold text-gray-700">{room.name}</span>
                                        <span className="text-gray-500 ml-4">Nama Tampilan: {room.displayName || "(Belum diatur)"}</span>
                                    </div>
                                    <div className="flex space-x-2">
                                        <button onClick={() => { setEditingRoom(room); setNewName(room.displayName || ''); }} className="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1 rounded">Ubah Nama</button>
                                        <button onClick={() => { setRoomToDelete(room); setShowDeleteModal(true); }} className="bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded">Hapus</button>
                                    </div>
                                </li>
                            ))}
                        </ul>
                    </div>

                    {editingRoom && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40">
                            <div className="bg-white p-6 rounded-lg shadow-xl w-full max-w-md">
                                <h3 className="text-xl font-bold mb-4">Ubah Nama Kamar {editingRoom.name}</h3>
                                <input 
                                    type="text"
                                    value={newName}
                                    onChange={(e) => setNewName(e.target.value)}
                                    className="w-full p-2 border rounded"
                                    placeholder="Masukkan nama baru"
                                />
                                <div className="mt-4 flex justify-end space-x-2">
                                    <button onClick={() => setEditingRoom(null)} className="bg-gray-300 px-4 py-2 rounded">Batal</button>
                                    <button onClick={handleSaveName} className="bg-blue-600 text-white px-4 py-2 rounded">Simpan</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <ConfirmationModal
                        show={showDeleteModal}
                        message={`Anda yakin ingin menghapus kamar ${roomToDelete?.name}? Tindakan ini tidak dapat dibatalkan.`}
                        onConfirm={handleDeleteRoom}
                        onCancel={() => setShowDeleteModal(false)}
                    />
                </div>
            );
        }

        function AdminChat({ onRoomSelect, unreadRooms }) {
            const { db, appId } = useContext(AppContext);
            const [messages, setMessages] = useState([]);
            const [selectedRoom, setSelectedRoom] = useState(null);
            const [newMessage, setNewMessage] = useState('');
            const messagesEndRef = useRef(null);
            const [showClearModal, setShowClearModal] = useState(false);

            useEffect(() => {
                if (!db) return;
                const chatsRef = db.collection(`artifacts/${appId}/public/data/chats`).orderBy('timestamp');
                const unsubscribe = chatsRef.onSnapshot(snapshot => {
                    setMessages(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsubscribe();
            }, [db, appId]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages, selectedRoom]);

            const groupedMessages = messages.reduce((acc, msg) => {
                (acc[msg.roomNumber] = acc[msg.roomNumber] || []).push(msg);
                return acc;
            }, {});

            const roomList = Object.keys(groupedMessages).sort();

            const handleSelectRoom = (room) => {
                setSelectedRoom(room);
                onRoomSelect(room);
            };

            const handleSendMessage = async () => {
                if (!newMessage.trim() || !selectedRoom) return;
                await db.collection(`artifacts/${appId}/public/data/chats`).add({
                    roomNumber: selectedRoom,
                    sender: 'Admin',
                    message: newMessage.trim(),
                    timestamp: new Date(),
                    isReadByAdmin: true
                });
                setNewMessage('');
            };
            
            const handleClearChat = async () => {
                if (!selectedRoom) return;
                const chatsRef = db.collection(`artifacts/${appId}/public/data/chats`);
                const q = chatsRef.where("roomNumber", "==", selectedRoom);
                const snapshot = await q.get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                setShowClearModal(false);
            };

            return (
                <div className="flex h-[80vh] bg-white rounded-lg shadow-md">
                    <div className="w-1/3 border-r border-gray-200 flex flex-col">
                        <h3 className="text-xl font-bold p-4 border-b">Pesan dari Kamar</h3>
                        <ul className="overflow-y-auto">
                            {roomList.map(room => (
                                <li key={room}>
                                    <button onClick={() => handleSelectRoom(room)} className={`w-full text-left p-4 hover:bg-gray-100 flex justify-between items-center ${selectedRoom === room ? 'bg-blue-100' : ''}`}>
                                        <span className={selectedRoom === room ? 'font-bold' : ''}>Kamar {room}</span>
                                        {unreadRooms.has(room) && <span className="w-3 h-3 bg-red-500 rounded-full"></span>}
                                    </button>
                                </li>
                            ))}
                        </ul>
                    </div>
                    <div className="w-2/3 flex flex-col">
                        {selectedRoom ? (
                            <>
                                <div className="p-4 border-b flex justify-between items-center">
                                    <span className="font-bold text-lg">Chat dengan Kamar {selectedRoom}</span>
                                    <button onClick={() => setShowClearModal(true)} className="text-xs bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600">Bersihkan Chat</button>
                                </div>
                                <div className="flex-grow p-4 overflow-y-auto bg-gray-50">
                                    {groupedMessages[selectedRoom]?.map(msg => (
                                        <div key={msg.id} className={`flex mb-3 ${msg.sender === 'Admin' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`p-3 rounded-lg max-w-[70%] ${msg.sender === 'Admin' ? 'bg-blue-500 text-white' : 'bg-gray-300 text-gray-800'}`}>
                                                <p>{msg.message}</p>
                                                <span className="text-xs opacity-75 mt-1 block">{new Date(msg.timestamp.toDate()).toLocaleTimeString()}</span>
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>
                                <div className="p-4 bg-white border-t flex">
                                    <input 
                                        type="text"
                                        value={newMessage}
                                        onChange={(e) => setNewMessage(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                        className="flex-grow p-2 border rounded-l-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        placeholder="Ketik balasan..."
                                    />
                                    <button onClick={handleSendMessage} className="bg-blue-600 text-white px-6 rounded-r-md hover:bg-blue-700">Kirim</button>
                                </div>
                            </>
                        ) : (
                            <div className="flex-grow flex items-center justify-center text-gray-500">Pilih kamar untuk melihat percakapan.</div>
                        )}
                    </div>
                    <ConfirmationModal
                        show={showClearModal}
                        message={`Anda yakin ingin menghapus semua chat dari Kamar ${selectedRoom}?`}
                        onConfirm={handleClearChat}
                        onCancel={() => setShowClearModal(false)}
                    />
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
